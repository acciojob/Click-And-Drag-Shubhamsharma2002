<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draggable Cubes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f3f3;
}

.item{
    width:900px;
    height:600px;
    border:4px solid #444;
    position:relative;
    overflow:hidden;
    background:white;
}

.items{
    width:90px;
    height:90px;
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:24px;
    font-weight:bold;
    border-radius:8px;
    cursor:grab;
    user-select:none;
    transition:box-shadow .2s;
}

.cube:active{
    cursor:grabbing;
}

.dragging{
    z-index:1000;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

</style>

</head>
<body>

<div class="container" id="item"></div>

<script>

const container=document.getElementById("item");

const rows=5;
const cols=5;

const size=90;
const gap=20;

let count=1;

for(let r=0;r<rows;r++){

    for(let c=0;c<cols;c++){

        const cube=document.createElement("div");

        cube.className="items";

        cube.innerText=count++;

        cube.style.background=`hsl(${Math.random()*360},70%,55%)`;

        cube.style.left=(gap+c*(size+gap))+"px";

        cube.style.top=(gap+r*(size+gap))+"px";

        container.appendChild(cube);
    }
}

let currentCube=null;

let offsetX=0;
let offsetY=0;

container.querySelectorAll(".cube").forEach(cube=>{

    cube.addEventListener("mousedown",function(e){

        currentCube=this;

        currentCube.classList.add("dragging");

        const rect=currentCube.getBoundingClientRect();

        offsetX=e.clientX-rect.left;

        offsetY=e.clientY-rect.top;

    });

});

document.addEventListener("mousemove",function(e){

    if(!currentCube) return;

    const containerRect=container.getBoundingClientRect();

    let x=e.clientX-containerRect.left-offsetX;

    let y=e.clientY-containerRect.top-offsetY;

    const maxX=container.clientWidth-currentCube.offsetWidth;

    const maxY=container.clientHeight-currentCube.offsetHeight;

    x=Math.max(0,Math.min(x,maxX));

    y=Math.max(0,Math.min(y,maxY));

    currentCube.style.left=x+"px";

    currentCube.style.top=y+"px";

});

document.addEventListener("mouseup",function(){

    if(currentCube){

        currentCube.classList.remove("dragging");

        currentCube=null;

    }

});

</script>

</body>
</html>
